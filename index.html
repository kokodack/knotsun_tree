<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>낯선대학 계보 네트워크</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/layout-base/layout-base.js"></script>
<script src="https://unpkg.com/cose-base/cose-base.js"></script>
<script src="https://unpkg.com/cytoscape-cose-bilkent@4.1.0/cytoscape-cose-bilkent.js"></script>
<script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<style>
  :root {
    --gradient-a:
      radial-gradient(ellipse at 12% 18%, #532b88 0%, transparent 42%),
      radial-gradient(ellipse at 84% 22%, #0b6670 0%, transparent 44%),
      radial-gradient(ellipse at 58% 92%, #722c59 0%, transparent 48%),
      linear-gradient(135deg, #070912 0%, #11152b 52%, #080b16 100%);
    --gradient-b: var(--gradient-a);
    --glass: rgba(20, 22, 45, 0.55);
    --glass-strong: rgba(28, 30, 58, 0.85);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #ecedf5;
    --text-dim: #8891ad;
    --text-muted: #5a6180;
    --cyan: #00d9ff;
    --magenta: #ff3d9a;
    --violet: #a855f7;
    --gold: #ffd54f;
    --orange: #ff8a65;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  html { background: #06070f; }
  body { background: transparent; isolation: isolate; }
  body::before, body::after {
    content: '';
    position: fixed; inset: 0;
    z-index: -2;
    animation: bgFloat 30s ease-in-out infinite alternate;
    transition: opacity 460ms ease;
    will-change: opacity, transform;
  }
  body::before { background: var(--gradient-a); opacity: 1; }
  body::after  { background: var(--gradient-b); opacity: 0; }
  body.gradient-swap::before { opacity: 0; }
  body.gradient-swap::after  { opacity: 1; }
  @keyframes bgFloat {
    0%   { transform: scale(1) translate(0, 0); }
    100% { transform: scale(1.15) translate(-3%, -2%); }
  }
  @media (prefers-reduced-motion: reduce) {
    body::before, body::after { transition-duration: 0ms; animation: none; }
  }
  #app { display: flex; height: 100vh; }
  #app::after {
    content: '';
    position: fixed; inset: 0;
    z-index: 1000;
    pointer-events: none;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.9'/%3E%3C/svg%3E");
  }

  /* ─── 사이드바 (글래스) ────────────────── */
  #sidebar {
    width: 340px;
    background: var(--glass);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    overflow-y: auto;
    flex-shrink: 0;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
  }
  #sidebar::-webkit-scrollbar { width: 6px; }
  #sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

  .logo {
    font-size: 22px; font-weight: 800; letter-spacing: -0.02em;
    color: #fff;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 12px; color: var(--text-dim); letter-spacing: 0.02em;
    margin-bottom: 24px;
  }
  .section-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    color: var(--text-muted); letter-spacing: 0.15em;
    margin: 22px 0 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: ''; width: 3px; height: 12px;
    background: var(--cyan);
    border-radius: 2px;
  }

  #search {
    width: 100%; padding: 11px 14px;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text); font-size: 13px;
    font-family: inherit;
    transition: all 0.2s ease;
  }
  #search:focus {
    outline: none;
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.15), 0 0 20px rgba(0, 217, 255, 0.2);
  }
  #search::placeholder { color: var(--text-muted); }

  .btn-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .btn {
    background: rgba(255,255,255,0.04);
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .btn:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text);
    border-color: var(--border-hover);
    transform: translateY(-1px);
  }
  .btn.active {
    background: var(--cyan);
    color: #06070f;
    border-color: transparent;
    font-weight: 600;
  }

  .legend .item {
    display: flex; align-items: center; margin: 6px 0;
    font-size: 12px; color: var(--text-dim);
  }
  .legend .swatch {
    width: 12px; height: 12px; border-radius: 50%;
    margin-right: 10px;
    box-shadow: 0 0 8px currentColor;
  }
  .swatch.gold      { background: #ffd54f; color: #ffd54f; }
  .swatch.orange    { background: #ff8a65; color: #ff8a65; }
  .swatch.gray      { background: #9e9e9e; color: transparent; }
  .swatch.cohort1   { background: #4fc3f7; color: #4fc3f7; }
  .swatch.cohort2   { background: #66d9a7; color: #66d9a7; }
  .swatch.cohort3   { background: #b191f7; color: #b191f7; }
  .swatch.cohort4   { background: #f76bcb; color: #f76bcb; }

  .rank .row {
    display: flex; align-items: center;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s ease;
    margin-bottom: 2px;
  }
  .rank .row:hover {
    background: rgba(255,255,255,0.05);
    transform: translateX(2px);
  }
  .rank .rid {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    font-size: 10.5px;
    margin-right: 10px;
    min-width: 56px;
  }
  .rank .rname { flex: 1; color: var(--text); font-weight: 500; }
  .rank .rcount {
    color: var(--cyan); font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .rank .medal {
    display: inline-block;
    width: 18px; text-align: center;
    margin-right: 6px;
    font-weight: 800;
  }

  /* ─── 캔버스 & 컨트롤 ────────────────── */
  #canvas { flex: 1; position: relative; }
  #cy { width: 100%; height: 100%; }

  .float-panel {
    position: absolute;
    background: var(--glass-strong);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    color: var(--text);
  }

  #topbar {
    top: 20px; right: 20px;
    padding: 10px 16px;
    font-size: 12px;
    display: flex; align-items: center; gap: 14px;
  }
  #topbar .metric { display: flex; align-items: center; gap: 6px; }
  #topbar .metric .k { color: var(--text-muted); }
  #topbar .metric .v {
    font-family: 'JetBrains Mono', monospace;
    color: var(--cyan); font-weight: 600;
  }
  #topbar .divider { width: 1px; height: 14px; background: var(--border); }
  #topbar .hint { color: var(--text-dim); font-size: 11px; }

  #zoomctl {
    bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 2px;
    padding: 6px; border-radius: 16px;
  }
  #zoomctl button {
    width: 40px; height: 40px;
    background: transparent;
    border: none; border-radius: 10px;
    color: var(--text-dim);
    font-size: 18px; font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  #zoomctl button:hover {
    background: rgba(255,255,255,0.08);
    color: #fff;
  }
  #zoomctl button:active { transform: scale(0.92); }
  #zoomctl .sep {
    height: 1px; margin: 4px 6px; background: var(--border);
  }
  #zoomctl svg { width: 18px; height: 18px; }

  #zoominfo {
    bottom: 24px; left: 360px;
    padding: 8px 14px; border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-dim);
  }

  /* ─── 툴팁 ────────────────── */
  #tooltip {
    position: absolute;
    background: var(--glass-strong);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid var(--border-hover);
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    max-width: 300px;
    z-index: 20;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0, 217, 255, 0.08);
    animation: tipFade 0.15s ease-out;
  }
  @keyframes tipFade {
    from { opacity: 0; transform: translateY(4px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  #tooltip .tname {
    font-size: 16px; font-weight: 700;
    background: linear-gradient(90deg, #fff, #b8c1e0);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 3px;
  }
  #tooltip .tid {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--cyan);
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }
  #tooltip .trow {
    display: flex; justify-content: space-between;
    padding: 4px 0;
    border-top: 1px solid var(--border);
  }
  #tooltip .trow:first-of-type { border-top: none; }
  #tooltip .tk { color: var(--text-muted); font-size: 11px; }
  #tooltip .tv { color: var(--text); font-weight: 500; }
  #tooltip .tbadge {
    display: inline-block; margin-top: 10px;
    padding: 3px 8px; border-radius: 6px;
    font-size: 10.5px; font-weight: 600;
    background: linear-gradient(135deg, rgba(255, 213, 79, 0.2), rgba(255, 138, 101, 0.2));
    color: var(--gold);
    border: 1px solid rgba(255, 213, 79, 0.3);
  }
  .rolechip {
    display: inline-block;
    padding: 2px 7px; border-radius: 5px;
    font-size: 10px; font-weight: 600;
    margin-right: 4px; margin-top: 2px;
    background: rgba(255,255,255,0.06);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .rolechip.step { color: var(--gold); border-color: rgba(255,213,79,0.3); }
  .rolechip.jogyo { color: #b0b8cc; }
  .rolechip.chamyeo { color: var(--orange); border-color: rgba(255,138,101,0.3); }
  .rolechip.student { color: var(--cyan); border-color: rgba(0,217,255,0.3); }

  /* 로딩 */
  #loader {
    position: fixed; inset: 0;
    background: var(--bg-0);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    transition: opacity 0.5s ease;
  }
  #loader.gone { opacity: 0; pointer-events: none; }
  #loader .spinner {
    width: 40px; height: 40px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loader"><div class="spinner"></div></div>

<div id="app">
  <div id="sidebar">
    <div class="logo">낯선대학 계보</div>
    <div class="subtitle">1~4기 · 부모→자식 초대 네트워크</div>

    <div class="section-title">검색</div>
    <input type="text" id="search" placeholder="이름 또는 ID (예: O_1_01)">

    <div class="section-title">기수 필터</div>
    <div class="btn-group" id="cohortFilter">
      <button class="btn active" data-cohort="all">전체</button>
      <button class="btn" data-cohort="1">1기</button>
      <button class="btn" data-cohort="2">2기</button>
      <button class="btn" data-cohort="3">3기</button>
      <button class="btn" data-cohort="4">4기</button>
    </div>

    <div class="section-title">레이아웃</div>
    <div class="btn-group" id="layoutSelector">
      <button class="btn active" data-layout="cose">관계망</button>
      <button class="btn" data-layout="dagre">계층형</button>
      <button class="btn" data-layout="concentric">동심원</button>
    </div>

    <div class="section-title">라벨</div>
    <div class="btn-group" id="labelSelector">
      <button class="btn active" data-label="name">이름</button>
      <button class="btn" data-label="id">ID</button>
      <button class="btn" data-label="both">이름+ID</button>
    </div>

    <div class="section-title">범례</div>
    <div class="legend">
      <div class="item"><span class="swatch gold"></span>최초 7인</div>
      <div class="item"><span class="swatch orange"></span>스텝</div>
      <div class="item"><span class="swatch gray"></span>조교</div>
      <div class="item"><span class="swatch cohort1"></span>1기 참여</div>
      <div class="item"><span class="swatch cohort2"></span>2기 참여</div>
      <div class="item"><span class="swatch cohort3"></span>3기 참여</div>
      <div class="item"><span class="swatch cohort4"></span>4기 참여</div>
    </div>

  </div>

  <div id="canvas">
    <div id="topbar" class="float-panel">
      <div class="metric"><span class="k">노드</span><span class="v" id="stat-nodes">0</span></div>
      <div class="divider"></div>
      <div class="metric"><span class="k">엣지</span><span class="v" id="stat-edges">0</span></div>
    </div>

    <div id="cy"></div>

    <div id="zoominfo" class="float-panel"><span id="zoom-val">100</span>%</div>

    <div id="zoomctl" class="float-panel">
      <button id="zoom-in" title="확대">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button id="zoom-out" title="축소">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M5 12h14"/></svg>
      </button>
      <div class="sep"></div>
      <button id="zoom-fit" title="전체 보기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
      </button>
      <button id="zoom-focus" title="선택 계보 확대">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
      </button>
    </div>

    <div id="tooltip"></div>
  </div>
</div>

function nodeColor(n) {
  if (n.isOriginal7) return COLOR.original7;
  const roles = Object.values(n.roles || {});
  if (roles.includes('스텝')) return COLOR.promoted;
  if (n.firstRole === '조교') return COLOR.assistant;
  return COLOR.cohort[n.firstCohort] || '#666';
}
function nodeSize(n) {
  return Math.min(96, Math.max(24, 24 + (n.childCount || 0) * 3));

  const c = nodeColor(n);

}

// ── 툴팁
const tooltip = document.getElementById('tooltip');
function roleChip(role) {
  const cls = { '스텝':'step', '조교':'jogyo', '참여':'chamyeo', '학생':'student' }[role] || 'student';
  return `<span class="rolechip ${cls}">${role}</span>`;
}
function showTip(node, evt) {
  const d = node.data();
  const roleHtml = d.cohorts.map(c => `<span style="color:var(--text-muted);font-size:10.5px">${c}기</span> ${roleChip(d.roles[c])}`).join(' &nbsp;');
  const isSpecialParent = ['스텝','조교','참여'].includes(d.firstParent);
  const parentLine = (!isSpecialParent && d.firstParent)
    ? `<div class="trow"><span class="tk">부모</span><span class="tv">${d.firstParent}</span></div>` : '';
  const upN   = node.predecessors().nodes().length;
  const downN = node.successors().nodes().length;
  tooltip.innerHTML = `
    <div class="tname">${d.name}</div>
    <div class="tid">${d.id}</div>
    <div style="margin-bottom:10px;line-height:1.9">${roleHtml}</div>
    ${parentLine}
    <div class="trow"><span class="tk">상위 계보</span><span class="tv" style="color:#ff5fb4;font-family:'JetBrains Mono',monospace">${upN}명</span></div>
    <div class="trow"><span class="tk">하위 계보</span><span class="tv" style="color:var(--cyan);font-family:'JetBrains Mono',monospace">${downN}명</span></div>
    ${d.isOriginal7 ? '<div class="tbadge">★ 최초 7인</div>' : ''}
  `;
  // 노드의 실제 렌더 bounding box 기준으로 위치 계산 (커서 좌표 아님)
  const rBox = node.renderedBoundingBox();
  const canvasEl = document.getElementById('canvas');
  const cw = canvasEl.clientWidth;
  const ch = canvasEl.clientHeight;
  // 먼저 보이지 않게 표시해서 실제 크기 측정
  tooltip.style.visibility = 'hidden';
  tooltip.style.display = 'block';
  tooltip.style.left = '0px'; tooltip.style.top = '0px';
  const tw = tooltip.offsetWidth  || 280;
  const th = tooltip.offsetHeight || 180;
  // 기본: 노드 우측 옆
  let left = rBox.x2 + 12;
  let top  = rBox.y1;
  // 우측 넘침 → 노드 좌측으로
  if (left + tw > cw - 8) left = rBox.x1 - tw - 12;
  // 그래도 좌측 넘침 → 클램프
  if (left < 8) left = 8;
  // 하단 넘침 → 노드 위쪽으로
  if (top + th > ch - 8) top = Math.max(8, rBox.y2 - th);
  if (top < 8) top = 8;
  tooltip.style.left = left + 'px';
  tooltip.style.top  = top  + 'px';
  tooltip.style.visibility = 'visible';
}
cy.on('mouseover', 'node', e => showTip(e.target, e));
cy.on('mouseout', 'node', () => tooltip.style.display = 'none');
cy.on('pan zoom', () => tooltip.style.display = 'none');

// ── 인물 클릭 배경 팔레트
// Grainient의 다층 메쉬/그레인 감성을 CSS로 재해석한 독자 팔레트다.
// 흰색 텍스트와 글래스 패널의 가독성을 유지하도록 딥톤만 사용한다.
const BACKGROUND_PALETTE = [
  `radial-gradient(ellipse at 10% 15%, #006d77 0%, transparent 43%), radial-gradient(ellipse at 88% 24%, #3a0ca3 0%, transparent 45%), radial-gradient(ellipse at 62% 92%, #9d174d 0%, transparent 48%), linear-gradient(145deg, #041319 0%, #11102b 52%, #160817 100%)`,
  `radial-gradient(ellipse at 18% 78%, #0e7490 0%, transparent 45%), radial-gradient(ellipse at 80% 12%, #7e22ce 0%, transparent 43%), radial-gradient(ellipse at 72% 82%, #1d4ed8 0%, transparent 48%), linear-gradient(125deg, #07111f 0%, #17102c 55%, #071423 100%)`,
  `radial-gradient(ellipse at 12% 25%, #9f1239 0%, transparent 42%), radial-gradient(ellipse at 88% 35%, #c2410c 0%, transparent 44%), radial-gradient(ellipse at 42% 96%, #6d28d9 0%, transparent 50%), linear-gradient(150deg, #1c080d 0%, #26110b 50%, #12091e 100%)`,
  `radial-gradient(ellipse at 22% 8%, #047857 0%, transparent 45%), radial-gradient(ellipse at 92% 70%, #0369a1 0%, transparent 46%), radial-gradient(ellipse at 34% 92%, #854d0e 0%, transparent 48%), linear-gradient(135deg, #041510 0%, #071b24 55%, #171006 100%)`,
  `radial-gradient(ellipse at 8% 82%, #7c3aed 0%, transparent 45%), radial-gradient(ellipse at 92% 18%, #be185d 0%, transparent 44%), radial-gradient(ellipse at 48% 48%, #164e63 0%, transparent 52%), linear-gradient(120deg, #10091e 0%, #220b1b 52%, #06171c 100%)`,
  `radial-gradient(ellipse at 15% 12%, #1d4ed8 0%, transparent 42%), radial-gradient(ellipse at 82% 80%, #0f766e 0%, transparent 46%), radial-gradient(ellipse at 94% 8%, #9333ea 0%, transparent 44%), linear-gradient(155deg, #071026 0%, #061c1b 55%, #170a23 100%)`,
  `radial-gradient(ellipse at 20% 88%, #b45309 0%, transparent 46%), radial-gradient(ellipse at 85% 16%, #9f1239 0%, transparent 43%), radial-gradient(ellipse at 55% 48%, #4338ca 0%, transparent 50%), linear-gradient(130deg, #1a1005 0%, #210810 52%, #0c0b24 100%)`,
  `radial-gradient(ellipse at 10% 42%, #0f766e 0%, transparent 44%), radial-gradient(ellipse at 90% 55%, #6d28d9 0%, transparent 46%), radial-gradient(ellipse at 52% 100%, #be123c 0%, transparent 48%), linear-gradient(140deg, #051817 0%, #140c27 54%, #1c080f 100%)`
];
let currentBackgroundIndex = -1;
let showingGradientB = false;

function changeBackground() {
  let nextIndex;
  do {
    nextIndex = Math.floor(Math.random() * BACKGROUND_PALETTE.length);
  } while (nextIndex === currentBackgroundIndex);

  currentBackgroundIndex = nextIndex;
  const gradient = BACKGROUND_PALETTE[nextIndex];
  const rootStyle = document.documentElement.style;
  const hiddenVariable = showingGradientB ? '--gradient-a' : '--gradient-b';
  rootStyle.setProperty(hiddenVariable, gradient);
  showingGradientB = !showingGradientB;
  requestAnimationFrame(() => {
    document.body.classList.toggle('gradient-swap', showingGradientB);
  });
}

// ── 클릭 → 후손 하이라이트
cy.on('tap', 'node', e => {
  const root = e.target;
  changeBackground();
  cy.elements().addClass('faded').removeClass('hl-down hl-up rootpick');
  root.successors().removeClass('faded').addClass('hl-down');
  root.predecessors().removeClass('faded').addClass('hl-up');
  root.removeClass('faded').addClass('rootpick');
});
cy.on('tap', e => {
  if (e.target === cy) cy.elements().removeClass('faded hl-down hl-up rootpick');
});

// ── 검색
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  cy.nodes().removeClass('searchhit');
  if (!q) return;
  const hits = cy.nodes().filter(n =>
    n.data('name').toLowerCase().includes(q) || n.data('id').toLowerCase().includes(q)
  );
  hits.addClass('searchhit');
  if (hits.length > 0) cy.animate({ center: { eles: hits }, zoom: 1.3 }, { duration: 500, easing: 'ease-out' });
});

// ── 기수 필터
document.querySelectorAll('#cohortFilter button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#cohortFilter button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const c = btn.dataset.cohort;
    if (c === 'all') {
      cy.elements().style('display', 'element');
    } else {
      const cn = parseInt(c);
      cy.nodes().forEach(n => n.style('display', n.data('cohorts').includes(cn) ? 'element' : 'none'));
      cy.edges().forEach(e => e.style('display', e.data('cohorts').includes(cn) ? 'element' : 'none'));
    }
  });
});

// ── 레이아웃
document.querySelectorAll('#layoutSelector button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#layoutSelector button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    runLayout(btn.dataset.layout);
  });
});

// ── 라벨
document.querySelectorAll('#labelSelector button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#labelSelector button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const mode = btn.dataset.label;
    const attr = mode === 'id' ? 'labelId' : (mode === 'both' ? 'labelBoth' : 'labelName');
    cy.style().selector('node').style('label', 'data(' + attr + ')').update();
  });
});

// ── 줌 컨트롤
const zoomVal = document.getElementById('zoom-val');
function updateZoomLabel() { zoomVal.textContent = Math.round(cy.zoom() * 100); }
cy.on('zoom', updateZoomLabel);
function smoothZoom(factor) {
  const z = cy.zoom() * factor;
  const c = { x: cy.width()/2, y: cy.height()/2 };
  cy.animate({ zoom: { level: Math.max(cy.minZoom(), Math.min(cy.maxZoom(), z)), renderedPosition: c }},
             { duration: 220, easing: 'ease-out' });
}
document.getElementById('zoom-in').onclick  = () => smoothZoom(1.25);
document.getElementById('zoom-out').onclick = () => smoothZoom(0.8);
document.getElementById('zoom-fit').onclick = () => cy.animate({ fit: { padding: 40 }}, { duration: 500, easing: 'ease-out' });
document.getElementById('zoom-focus').onclick = () => {
  const focused = cy.elements('.rootpick, .hl-down, .hl-up');
  if (focused.length > 0) {
    cy.animate({ fit: { eles: focused, padding: 60 }}, { duration: 500, easing: 'ease-out' });
  }
};

// ── 초기 레이아웃 + 로더 제거
runLayout('cose');
setTimeout(() => {
  document.getElementById('loader').classList.add('gone');
  updateZoomLabel();
}, 400);
</script>
</body>
</html>
